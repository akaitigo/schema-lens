version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - bodyclose
    - durationcheck
    - copyloopvar
    - govet
    - nilerr
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - errname
    - goconst
    - gocritic
    - misspell
    - nakedret
    - prealloc
    - predeclared
    - unconvert
    - unparam
    - unused
    - whitespace
    - ineffassign
    - cyclop
    - gocognit
    - nestif
    - usetesting
    - tparallel

  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - whyNoLint
    govet:
      enable-all: true
    nakedret:
      max-func-lines: 10
    nestif:
      min-complexity: 5

  exclusions:
    presets:
      - std-error-handling
    rules:
      - linters:
          - goconst
          - gocritic
          - cyclop
        path: ".*_test\\.go$"
      - linters:
          - gocognit
          - cyclop
        path: ".*/cmd/.*"

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
